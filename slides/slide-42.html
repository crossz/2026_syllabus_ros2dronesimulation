<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第三周知识点总结</title>
  <style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}
.slide-content {
  width: 960px;
  height: 540px;
  position: relative;
  transform-origin: center center;
}
</style>
<script>
function scaleSlide() {
  const slide = document.querySelector('.slide-content');
  if (!slide) return;
  const slideWidth = 960;
  const slideHeight = 540;
  const scaleX = window.innerWidth / slideWidth;
  const scaleY = window.innerHeight / slideHeight;
  const scale = Math.min(scaleX, scaleY);
  slide.style.width = slideWidth + 'px';
  slide.style.height = slideHeight + 'px';
  slide.style.transform = `scale(${scale})`;
  slide.style.transformOrigin = 'center center';
  slide.style.flexShrink = '0';
}
window.addEventListener('load', scaleSlide);
window.addEventListener('resize', scaleSlide);
</script>
</head>
<body>
<div class="slide-content" style="background: #1A1A1A;">
  <!-- 背景装饰 -->
  <svg width="960" height="540" style="position:absolute;top:0;left:0;opacity:0.06;">
    <defs>
      <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
        <circle cx="15" cy="15" r="1.5" fill="#83C5BE"/>
      </pattern>
    </defs>
    <rect width="960" height="540" fill="url(#dots)"/>
  </svg>
  
  <!-- 主标题 -->
  <p style="position:absolute; left:40px; top:28px; margin:0; font-size:28px; font-weight:600; color:#FFD700; font-family:'Times New Roman', serif;">第三周知识点总结</p>
  
  <!-- 左侧内容区 - -->
  <div style="position:absolute; left:40px; top:80px; width:440px; height:430px; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:12px;">
    <!-- 知识点1 -->
    <div style="padding:14px; background:#FFD700" fill-opacity="0.1" border="1px solid #FFD700">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="8" stroke="#FFD700" stroke-width="1.5" fill="none"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#FFD700" font-family:'Times New Roman', serif">1</text>
        </svg>
        <p style="margin:0; font-size:13px; font-weight:600; color:#FFD700; font-family:'Times New Roman', serif;">节点设计哲学</p>
      </div>
      <p style="margin:0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif; line-height:1.4;">每个节点负责单一功能，通过话题/服务通信</p>
      <p style="margin:4px 0 0 0; font-size:9px; color:#83C5BE; font-family:'Times New Roman', serif;">解耦、复用、并行执行</p>
    </div>
    
    <!-- 知识点2 -->
    <div style="padding:14px; background:#83C5BE" fill-opacity="0.1" border="1px solid #83C5BE">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="8" stroke="#83C5BE" stroke-width="1.5" fill="none"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#83C5BE" font-family:'Times New Roman', serif">2</text>
        </svg>
        <p style="margin:0; font-size:13px; font-weight:600; color:#83C5BE; font-family:'Times New Roman', serif;">Topic vs Service</p>
      </div>
      <p style="margin:0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif; line-height:1.4;">Topic: 持续数据流</p>
      <p style="margin:2px 0 0 0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif; line-height:1.4;">Service: 请求-响应</p>
      <p style="margin:2px 0 0 0; font-size:9px; color:#83C5BE; font-family:'Times New Roman', serif;">Action: 带反馈的长时任务</p>
    </div>
    
    <!-- 知识点3 -->
    <div style="padding:14px; background:#FFFFFF" fill-opacity="0.1" border="1px solid #FFFFFF" fill-opacity="0.3">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="8" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-opacity="0.7"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#FFFFFF" fill-opacity="0.7" font-family:'Times New Roman', serif">3</text>
        </svg>
        <p style="margin:0; font-size:13px; font-weight:600; color:#FFFFFF; font-family:'Times New Roman', serif;">DDS中间件</p>
      </div>
      <p style="margin:0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif; line-height:1.4;">Data Distribution Service</p>
      <p style="margin:2px 0 0 0; font-size:9px; color:#83C5BE; font-family:'Times New Roman', serif;">发布-订阅、实时性保障</p>
    </div>
    
    <!-- 知识点4 -->
    <div style="padding:14px; background:#FFFFFF" fill-opacity="0.1" border="1px solid #FFFFFF" fill-opacity="0.3">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="8" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-opacity="0.7"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#FFFFFF" fill-opacity="0.7" font-family:'Times New Roman', serif">4</text>
        </svg>
        <p style="margin:0; font-size:13px; font-weight:600; color:#FFFFFF; font-family:'Times New Roman', serif;">QoS策略配置</p>
      </div>
      <p style="margin:0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif; line-height:1.4;">Reliability / Durability</p>
      <p style="margin:2px 0 0 0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif; line-height:1.4;">Deadline / History</p>
      <p style="margin:2px 0 0 0; font-size:9px; color:#83C5BE; font-family:'Times New Roman', serif;">按需配置优化性能</p>
    </div>
    
    <!-- 知识点5 - 横跨两列 -->
    <div style="grid-column:span 2; padding:14px; background:#FFD700" fill-opacity="0.1" border="1px solid #FFD700">
      <div style="display:flex; align-items:center; gap:6px; margin-bottom:6px;">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <circle cx="10" cy="10" r="8" stroke="#FFD700" stroke-width="1.5" fill="none"/>
          <text x="10" y="10" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#FFD700" font-family:'Times New Roman', serif">5</text>
        </svg>
        <p style="margin:0; font-size:13px; font-weight:600; color:#FFD700; font-family:'Times New Roman', serif;">生命周期节点</p>
      </div>
      <div style="display:flex; gap:20px; margin-top:4px;">
        <div>
          <p style="margin:0; font-size:10px; color:#FFFFFF; font-family:'Times New Roman', serif;">Unconfigured → Inactive → Active → Finalized</p>
        </div>
        <div>
          <p style="margin:0; font-size:9px; color:#83C5BE; font-family:'Times New Roman', serif;">确定性启动/关闭</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 右侧示意图 -->
  <div style="position:absolute; left:500px; top:80px; width:420px; height:430px; background:#FFFFFF" fill-opacity="0.03" border="1px solid #83C5BE">
    <img src="imgs/slide42_summary.png" style="width:100%; height:100%; object-fit:contain;"/>
  </div>
  
  <!-- 页码角标 -->
  <svg style="position:absolute; right:32px; bottom:24px;" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="18" fill="#83C5BE"/>
    <text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#1A1A1A" font-family:'Times New Roman', serif">42</text>
  </svg>
</div>
</body>
</html>
